<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Один Семестр</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Phaser canvas renders here -->
  <div id="game-container"></div>

  <!-- UI overlay layer — all HTML UI goes here, above the canvas -->
  <div id="ui-overlay">
    <!-- HUD — built dynamically by ui/hud.js -->

    <!-- Dialogue box -->
    <div id="dialogue-box" class="dialogue-box hidden">
      <div class="dialogue-portrait">
        <img id="dialogue-portrait-img" src="" alt="NPC portrait">
      </div>
      <div class="dialogue-content">
        <div id="dialogue-speaker" class="dialogue-speaker"></div>
        <div id="dialogue-text-ru" class="dialogue-text-ru"></div>
        <div id="dialogue-text-en" class="dialogue-text-en"></div>
      </div>
      <div id="dialogue-choices" class="dialogue-choices"></div>
      <div id="dialogue-input" class="dialogue-input hidden">
        <input type="text" id="dialogue-input-field" autocomplete="off" autocapitalize="off">
        <button id="dialogue-input-submit" type="button">OK</button>
      </div>
    </div>

    <!-- Journal overlay -->
    <div id="journal" class="journal hidden">
      <div class="journal-header">
        <h2 class="journal-title">Student Journal</h2>
        <button id="journal-close" class="journal-close" type="button" aria-label="Close journal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="journal-tabs">
        <button class="journal-tab active" data-tab="vocabulary">Words</button>
        <button class="journal-tab" data-tab="phrases">Phrases</button>
        <button class="journal-tab" data-tab="missions">Missions</button>
        <button class="journal-tab" data-tab="progress">Progress</button>
      </div>
      <div id="journal-content" class="journal-content"></div>
    </div>

    <!-- Menu overlay -->
    <div id="menu" class="menu hidden">
      <h2 class="menu-title">Paused</h2>
      <button id="menu-resume" class="menu-btn" type="button">Resume</button>
      <button id="menu-journal" class="menu-btn" type="button">Journal</button>
      <button id="menu-settings" class="menu-btn" type="button">Settings</button>
    </div>
  </div>

  <!-- Scripts — Phaser first, then game, then UI -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14/build/Tone.js"></script>
  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="tutor.js"></script>
  <script src="game/systems/AudioManager.js"></script>
  <script src="game/systems/MistakeLogger.js"></script>
  <script src="game/systems/DialogueSystem.js"></script>
  <script src="game/systems/MissionSystem.js"></script>
  <script src="game/systems/MissionGenerator.js"></script>
  <script src="game/entities/Player.js"></script>
  <script src="game/entities/NPC.js"></script>
  <script src="game/systems/MapBuilder.js"></script>
  <script src="game/scenes/Boot.js"></script>
  <script src="game/scenes/Town.js"></script>
  <script src="game/scenes/WorldScene.js"></script>
  <script src="game/content/apartment-dialogue.js"></script>
  <script src="game/content/park-dialogue.js"></script>
  <script src="game/content/cafe-dialogue.js"></script>
  <script src="game/content/market-dialogue.js"></script>
  <script src="game/content/station-dialogue.js"></script>
  <script src="game/content/police-dialogue.js"></script>
  <script src="game/scenes/ApartmentScene.js"></script>
  <script src="game/scenes/ParkScene.js"></script>
  <script src="game/scenes/CafeScene.js"></script>
  <script src="game/scenes/MarketScene.js"></script>
  <script src="game/scenes/StationScene.js"></script>
  <script src="game/scenes/PoliceScene.js"></script>
  <script src="game/scenes/TestScene.js"></script>
  <script src="game/main.js"></script>
  <script src="ui/hud.js"></script>
  <script src="ui/dialogue.js"></script>
  <script src="ui/journal.js"></script>
  <script src="ui/menu.js"></script>
  <script src="ui/settings.js"></script>
  <script src="ui/onboarding.js"></script>
  <script src="ui/test.js"></script>
  <script src="ui/VirtualJoystick.js"></script>
  <script>OnboardingUI.init();</script>
</body>
</html>
