<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Один Семестр</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="style.css">
  <style>
    @font-face {
      font-family: 'Kenney Pixel';
      src: url('assets/fonts/KenneyPixel.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Kenney Mini';
      src: url('assets/fonts/KenneyMini.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
  </style>
</head>
<body>
  <!-- Phaser canvas renders here -->
  <div id="game-container"></div>

  <!-- UI overlay layer — all HTML UI goes here, above the canvas -->
  <div id="ui-overlay">
    <!-- HUD — built dynamically by ui/hud.js -->

    <!-- Menu overlay -->
    <div id="menu" class="menu hidden">
      <h2 class="menu-title">Paused</h2>
      <button id="menu-resume" class="menu-btn" type="button">Resume</button>
      <button id="menu-journal" class="menu-btn" type="button">Journal</button>
      <button id="menu-settings" class="menu-btn" type="button">Settings</button>
    </div>
  </div>

  <!-- Scripts — Phaser first, then game, then UI -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
  <script src="config.js"></script>
  <script src="storage.js"></script>
  <script src="tutor.js"></script>
  <script src="game/systems/AudioManager.js"></script>
  <script src="game/systems/MistakeLogger.js"></script>
  <script src="game/systems/MissionGenerator.js"></script>
  <script src="game/systems/StoryMissions.js"></script>
  <script src="game/entities/Player.js"></script>
  <script src="game/entities/NPC.js"></script>
  <script src="game/systems/MapBuilder.js"></script>
  <script src="game/scenes/Boot.js"></script>
  <script src="game/scenes/WorldScene.js"></script>
  <script src="game/content/apartment-dialogue.js"></script>
  <script src="game/content/park-dialogue.js"></script>
  <script src="game/content/cafe-dialogue.js"></script>
  <script src="game/content/market-dialogue.js"></script>
  <script src="game/content/station-dialogue.js"></script>
  <script src="game/content/police-dialogue.js"></script>
  <script src="game/utils/variation-selector.js"></script>
  <script src="game/scenes/ApartmentScene.js"></script>
  <script src="game/scenes/ParkScene.js"></script>
  <script src="game/scenes/CafeScene.js"></script>
  <script src="game/scenes/MarketScene.js"></script>
  <script src="game/scenes/StationScene.js"></script>
  <script src="game/scenes/PoliceScene.js"></script>
  <script src="game/scenes/TestScene.js"></script>
  <script src="game/main.js"></script>
  <script src="ui/hud.js"></script>
  <script src="ui/dialogue.js"></script>
  <script src="ui/journal.js"></script>
  <script src="ui/menu.js"></script>
  <script src="ui/settings.js"></script>
  <script src="ui/onboarding.js"></script>
  <script src="ui/test.js"></script>
  <script src="ui/graduation.js"></script>
  <script src="ui/VirtualJoystick.js"></script>
  <script>OnboardingUI.init();</script>
</body>
</html>
